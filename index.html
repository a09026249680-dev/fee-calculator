<!DOCTYPE html>

        th, td { border: 1px solid #ccc; padding: 6px 4px; text-align: center; font-size: 11px; vertical-align: middle; }
        th { background: #f8f8f8; white-space: nowrap; }
        
        .row-alert { color: #d63031; font-weight: bold; font-size: 9px; }
        .qty-input { width: 40px; text-align: center; }
        .eda-input { width: 50px; text-align: center; border: 1px solid #ddd; }
        .size-input { width: 40px; text-align: center; border: 1px solid #ddd; }
        .text-input { width: 130px; text-align: left; border: 1px solid #ddd; padding: 4px; }
        
        .row-mode-selector { display: flex; gap: 1px; justify-content: center; background: #eee; padding: 2px; border-radius: 4px; }
        /* 【修正】手動クリックができるように pointer-events を削除 */
        .row-mode-selector button { border: none; padding: 4px 10px; cursor: pointer; font-size: 10px; border-radius: 2px; background: #fff; color: #666; } 
        .row-mode-selector button.active.mode-weight { background: #0984e3; color: #fff; font-weight: bold; }
        .row-mode-selector button.active.mode-vol { background: #e67e22; color: #fff; font-weight: bold; }

        .status-vol { background: #fff5e6 !important; color: #e67e22; }

            const response = await fetch(CSV_URL);

            const text = await response.text();
            processCSVData(text);
            statusEl.innerText = "商品マスター読込完了 ✓";
            statusEl.style.color = "#27ae60";
        } catch (e) {
            statusEl.innerText = "商品マスター読込失敗（エラー）";
            statusEl.style.color = "#e74c3c";
        }
    }

    function processCSVData(csvText) {
        const lines = csvText.split(/\r\n|\n/);
        productMaster = lines.slice(1).map(line => {
            const c = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
            if (c.length < 7) return null;
            return { 
                model: (c[0]||"").replace(/"/g,'').trim(), eda: (c[1]||"").replace(/"/g,'').trim(),
                l: cleanNum(c[2]), w: cleanNum(c[3]), h: cleanNum(c[4]), weight: cleanNum(c[6]), 
                isCharter: cleanNum(c[7])===1, isAssist: cleanNum(c[8])===1, onlyKinroji: cleanNum(c[9])===1 
            };
        }).filter(x => x && x.model);
        updateCandidates();
    }

    function cleanNum(v) { return Number(String(v).replace(/[^0-9.]/g, '')) || 0; }

        }
    };

                <input type="hidden" class="in-charter" value="${item?.isCharter?'1':'0'}">
                <input type="hidden" class="in-assist" value="${item?.isAssist?'1':'0'}">
                <input type="hidden" class="in-only-k" value="${item?.onlyKinroji?'1':'0'}">
            </td>
            <td><input type="number" class="qty-input in-qty" value="1" min="1"></td>
            <td><input type="text" class="size-input in-l ${isM?'input-readonly':''}" value="${isM?item.l:0}" ${isM?'readonly':''}></td>
            <td><input type="text" class="size-input in-w ${isM?'input-readonly':''}" value="${isM?item.w:0}" ${isM?'readonly':''}></td>
            <td><input type="text" class="size-input in-h ${isM?'input-readonly':''}" value="${isM?item.h:0}" ${isM?'readonly':''}></td>
            <td><span class="read-only-num out-total">0</span></td>
            <td><input type="text" class="size-input in-weight ${isM?'input-readonly':''}" value="${isM?item.weight:0}" ${isM?'readonly':''}></td>
            <td>
                <div class="row-mode-selector">
                    <button class="active mode-weight" onclick="setMode(this, 'weight')">実重量</button>
                    <button class="mode-vol" onclick="setMode(this, 'vol')">容積</button>
                    <input type="hidden" class="in-mode" value="weight">
                </div>
            </td>
            <td class="out-judge-total">0.0</td>
            <td><button style="background:#ff7675; color:white; border:none; padding:4px; border-radius:3px; cursor:pointer;" onclick="deleteThisRow(this)">削除</button></td>
        `;

        if (item?.isCharter) document.getElementById('globalCharter').checked = true;
        if (item?.isAssist) document.getElementById('globalAssist').checked = true;

        // 【修正】入力があった時は isManualToggle を false にして自動判定を通す
        row.querySelectorAll('input').forEach(el => {
            el.oninput = () => calcRow(row, false);
        });
        renumber();
        calcRow(row, false);
    }

    // 【修正】手動でクリックされたときは強制的にそのモードを上書き保存する
    function setMode(btn, mode) {
        const container = btn.parentElement;
        container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        container.querySelector('.in-mode').value = mode;
        
        const row = container.closest('tr');
        calcRow(row, true); // 手動切り替えフラグを true にして実行
    }

    // 【修正】手動切り替え（isManual）の場合は自動判定をスキップする
    function calcRow(row, isManual = false) {
        const q = cleanNum(row.querySelector('.in-qty').value) || 1;
        const l = cleanNum(row.querySelector('.in-l').value);
        const w = cleanNum(row.querySelector('.in-w').value);
        const h = cleanNum(row.querySelector('.in-h').value);
        const weight = cleanNum(row.querySelector('.in-weight').value);

        // 1. 3辺計の計算
        const totalMM = l + w + h;
        row.querySelector('.out-total').innerText = totalMM;

        // 2. 容積換算重量の計算
        const volW = (l * w * h) / 6000000;

        let mode = row.querySelector('.in-mode').value;

        // 3. 入力変更による再計算時（手動ボタンクリックではない場合）のみ、自動判定をかける
        if (!isManual) {
            if (volW > weight) {
                mode = "vol";
            } else {
                mode = "weight";
            }
            
            // ボタンの見た目を自動判定結果に合わせる
            const selector = row.querySelector('.row-mode-selector');
            selector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if (mode === "vol") {
                selector.querySelector('.mode-vol').classList.add('active');
            } else {
                selector.querySelector('.mode-weight').classList.add('active');
            }
            row.querySelector('.in-mode').value = mode;
        }

        // 4. 判定重量（計）の算出とクラス適用
        let judge = (mode === "vol") ? volW : weight;
        let statusClass = (mode === "vol") ? "status-vol" : "status-weight";

        const cell = row.querySelector('.out-judge-total');
        cell.innerText = (judge * q).toFixed(1);
        cell.className = "out-judge-total " + statusClass;
        updateTotalSummary();
    }

    function refreshGlobalOptions() {
        let anyC = false, anyA = false;
        document.querySelectorAll('#pkgBody tr').forEach(row => {
            if (row.querySelector('.in-charter').value === "1") anyC = true;
            if (row.querySelector('.in-assist').value === "1") anyA = true;
        });
        document.getElementById('globalCharter').checked = anyC;
        document.getElementById('globalAssist').checked = anyA;
    }

    function updateTotalSummary() {
        let total = 0;
        document.querySelectorAll('.out-judge-total').forEach(td => total += Number(td.innerText));
        document.getElementById('totalW').innerText = total.toFixed(1);
    }

    function calculate() {
        const pref = document.getElementById('destination').value;
        if(!pref) return alert("配送先を選択してください");
        
        const sArea = PREF_TO_SAGAWA[pref];
        const yArea = PREF_TO_YAMATO[pref];
        const kArea = PREF_TO_KINROJI[pref];

        let totalW = 0, sSum = 0, ySum = 0, sOver = false, yOver = false, onlyK = false;
        let sRowsCount = 0; 
        let yRowsCount = 0; 
        const isOkinawa = (pref === "沖縄県");

        const chFee = Number(document.getElementById('inputCharterFee').value);
        const asFee = Number(document.getElementById('inputAssistFee').value);
        const hasCh = document.getElementById('globalCharter').checked;
        const hasAs = document.getElementById('globalAssist').checked;

        document.querySelectorAll('#pkgBody tr').forEach(row => {
            const q = cleanNum(row.querySelector('.in-qty').value);
            const mm = cleanNum(row.querySelector('.out-total').innerText);
            const wRow = Number(row.querySelector('.out-judge-total').innerText);
            if (row.querySelector('.in-only-k').value === "1") onlyK = true;
            totalW += wRow;
            
            if (mm > 0) {
                if (mm > 2600) sOver = true;
                else if (!isOkinawa) {
                    const sk = Object.keys(S_MASTER).map(Number).sort((a,b)=>a-b).find(k => mm <= k);
                    if (sk && S_MASTER[sk][sArea]) {
                        sSum += (S_MASTER[sk][sArea] * q);
                        sRowsCount++;
                    } else sOver = true;
                }
                if (mm > 2000) yOver = true;
                else {
                    const yk = Object.keys(Y_MASTER).map(Number).sort((a,b)=>a-b).find(k => mm <= k);
                    if (yk && Y_MASTER[yk][yArea]) {
                        ySum += (Y_MASTER[yk][yArea] * q);
                        yRowsCount++;
                    } else yOver = true;
                }
            }
        });

        let weightP = 0;
        if (totalW > 0 && K_MASTER[kArea]) {
            if (totalW <= 50) {
                const wk = Object.keys(K_MASTER[kArea]).map(Number).sort((a,b)=>a-b).find(k => totalW <= k);
                weightP = K_MASTER[kArea][wk];
            } else { weightP = K_MASTER[kArea][50] + (Math.ceil((totalW - 50) / 10) * K_ADD_MASTER[kArea]); }
        }
        const kTotal = weightP + (hasCh ? chFee : 0) + (hasAs ? asFee : 0);

        const sR = document.getElementById('res-sagawa');
        if(isOkinawa) { sR.innerText="別途別料金"; sR.className="price out-of-size"; }
        else if(sRowsCount === 0 && !sOver) { sR.innerText="サイズ入力待ち"; sR.className="price out-of-size"; }
        else if(sOver || onlyK) { sR.innerText="サイズ外"; sR.className="price out-of-size"; }
        else { sR.innerText=sSum.toLocaleString()+" 円"; sR.className="price"; }

        const yR = document.getElementById('res-yamato');
        if(yRowsCount === 0 && !yOver) { yR.innerText="サイズ入力待ち"; yR.className="price out-of-size"; }
        else if(yOver || onlyK) { yR.innerText="サイズ外"; yR.className="price out-of-size"; }
        else { yR.innerText=ySum.toLocaleString()+" 円"; yR.className="price"; }

        document.getElementById('res-kintetsu').innerText = kTotal.toLocaleString() + " 円";
        document.getElementById('res-kintetsu-detail').innerHTML = `発送先:${kArea} / 混載料金:${weightP.toLocaleString()}円` + (hasCh?`<br>+チャーター費:${chFee.toLocaleString()}円`:"") + (hasAs?`<br>+助手費:${asFee.toLocaleString()}円`:"");
    }

    function deleteThisRow(btn) { btn.closest('tr').remove(); renumber(); refreshGlobalOptions(); updateTotalSummary(); }
    function deleteSelected() { document.querySelectorAll('.row-chk:checked').forEach(c => c.closest('tr').remove()); renumber(); refreshGlobalOptions(); updateTotalSummary(); }
    function renumber() { document.querySelectorAll('.row-idx').forEach((td, i) => td.innerText = i + 1); }
    function toggleAll(m) { document.querySelectorAll('.row-chk').forEach(c => c.checked = m.checked); }
</script>
</body>
</html>
